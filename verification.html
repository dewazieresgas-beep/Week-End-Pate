<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérification des calculs — Pâtés de Gibier</title>
  <style>
    body{font-family:system-ui,Segoe UI,sans-serif;max-width:760px;margin:2rem auto;padding:0 1rem;color:#26241f}
    h1{font-family:Georgia,serif;color:#2f4a34}
    table{border-collapse:collapse;width:100%;margin-top:1rem}
    th,td{padding:.4rem .6rem;border-bottom:1px solid #e2dccd;text-align:left}
    td.n{text-align:right;font-variant-numeric:tabular-nums}
    .ok{color:#3c7a4e;font-weight:700}.ko{color:#a23b2d;font-weight:700}
    .banner{padding:1rem;border-radius:10px;font-weight:700;font-size:1.1rem;margin:1rem 0}
    .green{background:#dcefe0;color:#245a34}.red{background:#f7dcd6;color:#a23b2d}
  </style>
</head>
<body>
  <h1>🦌 Vérification des calculs</h1>
  <p>Cette page teste le <strong>vrai</strong> moteur du site (<code>seed.js</code> + <code>calc.js</code>)
     et compare chaque résultat aux valeurs de l'Excel « pâté 2026 ». Ouvre-la après toute modification du code.</p>
  <div id="banner"></div>
  <table id="results"><thead><tr><th>Contrôle</th><th class="n">Calculé</th><th class="n">Attendu (Excel)</th><th>État</th></tr></thead><tbody></tbody></table>

  <script src="js/seed.js"></script>
  <script src="js/calc.js"></script>
  <script>
    const db = App.seed.build();
    const c = App.calc.all(db);
    const w = c.prod.weight, cost = c.prod.cost;
    const eps = 1e-6;
    const tests = [
      ['Gibier net total (kg)', c.gibierNetTotal, 65.634100000000004],
      ['Poids pâté de lièvre', w.lievre, 10.482748640000002],
      ['Poids pâté de chevreuil', w.chevreuil, 25.610578800000003],
      ['Poids pâté de faisan', w.faisan, 22.188944039999996],
      ['Poids pâté foie de sanglier', w.foie_sanglier, 27.760384999999999],
      ['Poids civet de chevreuil', w.civet, 22.243923649999996],
      ['Poids TOTAL pâté (kg)', c.prod.totalWeight, 108.28658013],
      ['Coût pâté de lièvre (€)', cost.lievre, 26.130737920000005],
      ['Coût pâté de chevreuil (€)', cost.chevreuil, 73.2390264],
      ['Coût pâté de faisan (€)', cost.faisan, 101.81728511999999],
      ['Coût foie de sanglier (€)', cost.foie_sanglier, 49.625780000000006],
      ['Coût civet (€)', cost.civet, 94.959174699999991],
      ['Coût TOTAL ingrédients (€)', c.prod.totalCost, 345.77200414000004],
      ['Coût / participant (€)', c.budget.coutParticipant, 49.396000591428574],
      ['Total achats liste de courses (€)', c.shopping.totalAchats, 345.77200414000004],
      ['Bocaux 315 g suggérés', c.bocaux.totalSuggere, 343],
    ];
    let allOk = true;
    const tb = document.querySelector('#results tbody');
    tests.forEach(([label, got, exp]) => {
      const ok = Math.abs(got - exp) < eps;
      if (!ok) allOk = false;
      tb.insertAdjacentHTML('beforeend',
        `<tr><td>${label}</td><td class="n">${got.toLocaleString('fr-FR',{maximumFractionDigits:6})}</td>
         <td class="n">${exp.toLocaleString('fr-FR',{maximumFractionDigits:6})}</td>
         <td class="${ok?'ok':'ko'}">${ok?'✔ OK':'✘ ÉCART'}</td></tr>`);
    });
    document.getElementById('banner').className = 'banner ' + (allOk ? 'green' : 'red');
    document.getElementById('banner').textContent = allOk
      ? '✅ TOUS LES CONTRÔLES PASSENT — le site reproduit fidèlement l\'Excel.'
      : '❌ Des écarts existent — vérifier seed.js / calc.js.';
  </script>
</body>
</html>
