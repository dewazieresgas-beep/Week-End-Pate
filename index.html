<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journée Pâtés de Gibier — Maninghem</title>
  <meta name="description" content="Gestion de la journée pâtés de gibier : stocks, recettes, production, courses et budget." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦌</text></svg>" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <!-- ======================= ÉCRAN DE CONNEXION ======================= -->
  <div id="login" class="login-screen" hidden>
    <div class="login-card">
      <div class="login-brand">🦌</div>
      <h1>Journée Pâtés de Gibier</h1>
      <p class="login-sub">Maninghem — <span id="loginYear">2026</span></p>

      <div id="loginChoice">
        <button class="btn btn-primary btn-block" data-login="admin">
          🔑 Je suis Frédéric <span class="btn-note">(gestion complète)</span>
        </button>
        <button class="btn btn-outline btn-block" data-login="contrib">
          🖊️ Je suis un participant <span class="btn-note">(remplir mes quantités)</span>
        </button>
      </div>

      <form id="loginAdmin" class="login-form" hidden>
        <label>Mot de passe de gestion</label>
        <input type="password" id="adminPass" autocomplete="current-password" placeholder="Mot de passe" />
        <p class="login-hint">Astuce première fois : le mot de passe par défaut est <strong>pate</strong> (modifiable dans Paramètres).</p>
        <div class="login-actions">
          <button type="button" class="btn btn-ghost" data-login-back>← Retour</button>
          <button type="submit" class="btn btn-primary">Entrer</button>
        </div>
        <p id="adminErr" class="login-err" hidden>Mot de passe incorrect.</p>
      </form>

      <form id="loginContrib" class="login-form" hidden>
        <label>Qui es-tu ?</label>
        <select id="contribWho"></select>
        <div class="login-actions">
          <button type="button" class="btn btn-ghost" data-login-back>← Retour</button>
          <button type="submit" class="btn btn-primary">Entrer</button>
        </div>
      </form>
    </div>
    <p class="login-mode" id="loginMode"></p>
  </div>

  <!-- ============================ APPLICATION ============================ -->
  <div id="app" hidden>
    <header class="topbar">
      <button class="burger" id="burger" aria-label="Menu">☰</button>
      <div class="brand" data-nav="#/">
        <span class="brand-emoji">🦌</span>
        <span class="brand-text">Pâtés de Gibier <em id="brandYear">2026</em></span>
      </div>
      <div class="topbar-right">
        <span class="who" id="whoBadge"></span>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Quitter</button>
      </div>
    </header>

    <nav class="sidenav" id="sidenav"></nav>
    <div class="scrim" id="scrim"></div>

    <main class="content" id="view"></main>

    <footer class="foot">
      <span id="footMode"></span>
      <span class="foot-sep">•</span>
      <button class="linkbtn" id="exportBtn">Exporter les données</button>
      <span class="foot-sep">•</span>
      <button class="linkbtn" id="importBtn">Importer</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </footer>
  </div>

  <!-- ============================== MODALE ============================== -->
  <div id="modal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ============================== TOASTS ============================== -->
  <div id="toasts" class="toasts"></div>

  <!-- ======================= SCRIPTS (ordre important) ======================= -->
  <script src="js/store.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/contribute.js"></script>
  <script src="js/pages/stocks.js"></script>
  <script src="js/pages/recipes.js"></script>
  <script src="js/pages/production.js"></script>
  <script src="js/pages/shopping.js"></script>
  <script src="js/pages/budget.js"></script>
  <script src="js/pages/params.js"></script>
  <script src="js/pages/years.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
